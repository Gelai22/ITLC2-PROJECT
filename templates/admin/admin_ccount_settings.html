<body xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin_master :: master(~{::main}, 'Account Settings', 'account_settings')}">
<main>
    <div class="container-fluid">

        <link rel="stylesheet" th:href="@{/css/account-settings.css}" />


        <div class="card bg-light-info shadow-none position-relative overflow-hidden mb-4">
            <div class="row">
                <div class="col-lg-12">
                    <div class="card-body">
                        <h4 class="mb-0 fw-semibold">Admin Account Settings</h4>
                        <p class="text-muted mb-0">Manage your profile information and security settings for the system.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title fw-semibold mb-4">Personal Details</h5>

                <form th:action="@{/account/update-profile}" th:object="${admin}" method="post">

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="employeeName" class="form-label">Full Name</label>
                            <input type="text" th:field="*{employeeName}" class="form-control" id="employeeName" required>
                        </div>
                        <div class="col-md-6">
                            <label for="age" class="form-label">Age</label>
                            <input type="number" th:field="*{age}" class="form-control" id="age">
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="emailAddress" class="form-label">Email Address</label>
                            <input type="email" th:field="*{emailAddress}" class="form-control" id="emailAddress" required readonly>
                        </div>
                        <div class="col-md-6">
                            <label for="phoneNumber" class="form-label">Phone Number</label>
                            <input type="tel"
                                   th:field="*{phoneNumber}"
                                   class="form-control"
                                   id="phoneNumber"
                                   maxlength="11"
                                   pattern="[0-9]{11}"
                                   title="Phone number must be exactly 11 digits"
                                   inputmode="numeric">
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-12">
                            <label for="homeAddress" class="form-label">Home Address</label>
                            <input type="text" th:field="*{homeAddress}" class="form-control" id="homeAddress">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="ti ti-user-check me-1"></i> Update Profile
                    </button>
                </form>

            </div>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h5 class="card-title fw-semibold mb-4 text-danger">Change Password</h5>

                <form th:action="@{/account/change-password}" method="post">

                    <div class="mb-3">
                        <label for="currentPassword" class="form-label">Current Password</label>
                        <input type="password" name="currentPassword" class="form-control" id="currentPassword" required>
                    </div>

                    <div class="mb-3">
                        <label for="newPassword" class="form-label">New Password</label>
                        <input type="password" name="newPassword" class="form-control" id="newPassword" required>
                    </div>

                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label">Confirm New Password</label>
                        <input type="password" name="confirmPassword" class="form-control" id="confirmPassword" required>
                    </div>

                    <button type="submit" class="btn btn-danger">
                        <i class="ti ti-lock me-1"></i> Change Password
                    </button>
                </form>

            </div>
        </div>

    </div>
</main>
</body>
