<aside class="left-sidebar" th:fragment="sidebar(currentPage)">
    <div>
        <div class="py-9 px-6 text-center"></div>
        <div class="py-9 px-6 text-center"></div>
        <div class="py-4 px-6 text-center"></div>
        <nav class="sidebar-nav scroll-sidebar" data-simplebar="">
            <ul id="sidebarnav">
                <li class="nav-small-cap">
                    <i class="ti ti-dots nav-small-cap-icon fs-4"></i>
                    <span class="hide-menu">RENTALS</span>
                </li>
                <li class="sidebar-item">
                    <a class="sidebar-link primary-hover-bg"
                       th:classappend="${currentPage == 'browse_cars'} ? 'active' : ''"

                       aria-expanded="false">
                        <span><i class="ti ti-car"></i></span>
                        <span class="hide-menu">Browse & Reserve Cars</span>
                    </a>
                </li>
                <li class="sidebar-item">
                    <a class="sidebar-link primary-hover-bg"
                       th:classappend="${currentPage == 'my_reservations'} ? 'active' : ''"
                       th:href="@{/reservation}"
                       aria-expanded="false">
                        <span><i class="ti ti-history"></i></span>
                        <span class="hide-menu">My Reservations</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
