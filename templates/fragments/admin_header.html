<header class="app-header" th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item d-block d-xl-none">
                <a class="nav-link sidebartoggler nav-icon-hover" id="headerCollapse" href="javascript:void(0)">
                    <i class="ti ti-menu-2"></i>
                </a>
            </li>
            <div class="brand-logo d-flex align-items-center justify-content-between">
                <a th:href="@{/dashboard}" class="text-nowrap logo-img">
                    <img th:src="@{/images/logos/logo.png}" width="180" alt="Car Rental Logo" />
                </a>
            </div>
        </ul>
        <div class="navbar-collapse justify-content-end px-0" id="navbarNav">
            <ul class="navbar-nav flex-row ms-auto align-items-center justify-content-end">

                <li class="nav-item d-none d-lg-block me-3" th:if="${adminUser != null}">
                    <span class="fw-bold fs-3"
                          th:text="${adminUser.employeeName}">Admin Name</span>
                </li>

                <li class="nav-item dropdown" th:if="${adminUser != null}">
                    <a class="nav-link nav-icon-hover" href="javascript:void(0)" id="drop2" data-bs-toggle="dropdown"
                       aria-expanded="false">
                        <img th:src="@{/images/placeholder.jpg}" alt="" width="35" height="35"
                             class="rounded-circle">
                    </a>
                    <div class="dropdown-menu dropdown-menu-end dropdown-menu-animate-up" aria-labelledby="drop2">
                        <div class="message-body">

                            <div class="p-3">
                                <h5 class="mb-0 fs-5 fw-bolder"
                                    th:text="${adminUser.employeeName}">Admin Name</h5>
                                <p class="mb-0 fs-3 text-muted"
                                   th:text="${adminUser.emailAddress}">admin@example.com</p>
                            </div>

                            <a th:href="@{/admin/account}" class="d-flex align-items-center gap-2 dropdown-item">
                                <i class="ti ti-user fs-6"></i>
                                <p class="mb-0 fs-3">Account Settings</p>
                            </a>

                            <form th:action="@{/logout}" method="post" class="mx-3 mt-2 d-block">
                                <button type="submit" class="btn btn-outline-primary w-100">Logout</button>
                            </form>
                        </div>
                    </div>
                </li>
            </ul>
        </div>
    </nav>
</header>
