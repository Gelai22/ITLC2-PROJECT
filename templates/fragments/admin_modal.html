<div th:fragment="admin_modal">
    <div class="modal fade" id="deleteVehicleModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">

        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title text-danger" id="modalLabel">Confirm Deletion</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body text-center">
                    <i class="ti ti-alert-triangle fs-4 text-warning d-block mb-3"></i>

                    <p class="lead fw-semibold">Are you sure you want to delete the vehicle with plate number:</p>
                    <strong id="modal-plate-number-display" class="fs-4 text-dark d-block">N/A</strong>
                    <p class="text-muted small mt-2">This action cannot be undone.</p>

                    <input type="hidden" id="vehicleIdToDelete" name="id" value="" />
                </div>

                <div class="modal-footer justify-content-center">

                    <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>

                    <form id="deleteForm" method="get" style="display:inline;">
                        <button type="submit" class="btn btn-danger rounded-pill">Yes, Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
