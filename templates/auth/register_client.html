<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="layouts/auth_master :: auth_master(authContent = ~{::.register-content}, pageTitle = 'Client Registration', loginLink = @{/login})">
<body>
<div class="register-content">

    <h5 class="text-center fw-semibold mb-4">Client Registration</h5>

    <div th:if="${emailExistsError}" class="alert alert-danger" role="alert">
        <p class="fs-4 mb-0" th:text="${emailExistsError}"></p>
    </div>

    <form th:action="@{/register}" th:object="${client}" method="post">

        <div class="mb-3">
            <label for="nameInput" class="form-label">Username</label>
            <input type="text" th:field="*{customerName}" class="form-control"
                   th:classappend="${#fields.hasErrors('customerName')} ? 'is-invalid' : ''" id="nameInput" required>
            <div th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}" class="invalid-feedback"></div>
        </div>

        <div class="mb-3">
            <label for="emailInput" class="form-label">Email Address</label>
            <input type="email" th:field="*{emailAddress}" class="form-control"
                   th:classappend="${#fields.hasErrors('emailAddress')} ? 'is-invalid' : ''" id="emailInput" required>
            <div th:if="${#fields.hasErrors('emailAddress')}" th:errors="*{emailAddress}" class="invalid-feedback"></div>
        </div>

        <div class="mb-4">
            <label for="passwordRegisterInput" class="form-label">Password</label>
            <div class="input-group">
                <input type="password" th:field="*{password}" class="form-control"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" id="passwordRegisterInput" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePasswordVisibility('passwordRegisterInput', 'toggleIconRegister')">
                    <i id="toggleIconRegister" class="ti ti-eye"></i>
                </button>
            </div>
            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="invalid-feedback d-block"></div>
        </div>
        <div class="mb-4">
        </div>

        <button type="submit" class="btn btn-primary w-100 py-8 fs-4 mb-4">Sign Up</button>

        <div class="d-flex align-items-center justify-content-center">
            <p class="fs-4 mb-0 fw-bold">Already have an Account?</p>
            <a class="text-primary fw-bold ms-2" th:href="@{/login}">Sign In</a>
        </div>
    </form>

    <a th:href="@{/}" class="btn btn-outline-light w-100 mt-3 text-dark">
        <i class="ti ti-arrow-left me-1"></i> Back to Welcome Page
    </a>
</div>
</body>
</html>
