<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/auth_master :: auth_master(authContent = ~{::.login-content}, pageTitle = 'Client Login', loginLink = @{/register})}">
<body>
<div class="login-content">
    <h5 class="text-center fw-semibold mb-4">Client / Customer Login</h5>

    <div th:if="${param.registered}" class="alert alert-success alert-dismissible fade show" role="alert">
        Registration successful! Please log in with your new account.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        Invalid email or password. Please try again.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label for="usernameInput" class="form-label">Email Address</label>
            <input type="text" name="username" class="form-control" id="usernameInput" aria-describedby="emailHelp">
        </div>

        <div class="mb-4">
            <label for="passwordInput" class="form-label">Password</label>
            <div class="input-group">
                <input type="password" name="password" class="form-control" id="passwordInput" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePasswordVisibility('passwordInput', 'toggleIconLogin')">
                    <i id="toggleIconLogin" class="ti ti-eye"></i>
                </button>
            </div>
        </div>

        <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="form-check">
                <input class="form-check-input primary" type="checkbox" value="" id="flexCheckChecked" checked>
                <label class="form-check-label text-dark" for="flexCheckChecked">
                    Remember this Device
                </label>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-8 fs-4 mb-4">Sign In</button>
        <div class="d-flex align-items-center justify-content-center">
            <p class="fs-4 mb-0 fw-bold">New to ParkUp?</p>
            <a class="text-primary fw-bold ms-2" th:href="@{/register}">Create an account</a>
        </div>
    </form>

    <a th:href="@{/}" class="btn btn-outline-light w-100 mt-3 text-dark">
        <i class="ti ti-arrow-left me-1"></i> Back to Welcome Page
    </a>
</div>
</body>
</html>
